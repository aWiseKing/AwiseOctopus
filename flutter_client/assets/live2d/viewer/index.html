<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Awise Live2D Pet</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      body {
        font-family: "Segoe UI", sans-serif;
      }

      #stage {
        position: absolute;
        inset: 0;
      }

      #tip {
        position: absolute;
        left: 16px;
        bottom: 16px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.55);
        color: #fff;
        font-size: 12px;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="tip">点击角色可触发互动动作</div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cubism4-core@1.0.0/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
    <script src="./live2d_bridge.js"></script>
    <script src="./live2d_bootstrap.js"></script>
  </body>
</html>
